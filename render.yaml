# Render Blueprint — Vision is a pure static site (HTML + one generated JS file).
# Create it on Render via "New +" -> "Static Site" with Publish Directory "." and
# an empty build command, or "Blueprint" pointed at this repo.
services:
  - type: web
    name: vision
    runtime: static
    buildCommand: "echo 'static site - no build step'"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
